{% extends "base.html" %}{% block page_icon %}calendar-alt{% endblock %}{% block page_title %}Create Payroll Period{% endblock %}{% block content %}<div class="page-header"><h2>Create Payroll Period</h2><a href="{% url 'payroll_periods' %}" class="btn btn-outline">Back</a></div><div class="card"><form method="post">{% csrf_token %}<div class="form-group"><label>Period Name</label><input type="text" name="name" required placeholder="e.g., January 2026"></div><div class="form-group"><label>Branch</label><select name="branch" required>{% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}</select></div><div class="form-group"><label>Start Date</label><input type="date" name="start_date" required></div><div class="form-group"><label>End Date</label><input type="date" name="end_date" required></div><button type="submit" class="btn btn-success">Create Period</button></form></div>{% endblock %}
