<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>403 - Access Denied</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:16px; padding:48px; text-align:center; max-width:440px; box-shadow:0 4px 6px rgba(0,0,0,.07); }
  .icon { font-size:64px; color:#dc2626; margin-bottom:16px; }
  h1 { font-size:24px; margin-bottom:8px; }
  p { color:#64748b; margin-bottom:24px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; background:#2563eb; color:#fff; border-radius:8px; text-decoration:none; font-size:14px; }
  .btn:hover { background:#1d4ed8; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-lock"></i></div>
  <h1>Access Denied</h1>
  <p>You do not have permission to access this page. Please contact your administrator.</p>
  <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>
</body>
</html>
