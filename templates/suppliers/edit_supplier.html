{% extends "base.html" %}{% block page_icon %}truck{% endblock %}{% block page_title %}Edit Supplier{% endblock %}{% block content %}<div class="page-header"><h2>Edit Supplier</h2><a href="{% url 'supplier_detail' supplier.id %}" class="btn btn-outline">Back</a></div><div class="card"><form method="post">{% csrf_token %}<div class="form-group"><label>Supplier Name</label><input type="text" name="name" value="{{ supplier.name }}" required></div><div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ supplier.phone }}" required></div><div class="form-group"><label>Company</label><input type="text" name="company" value="{{ supplier.company }}"></div><div class="form-group"><label>Email</label><input type="email" name="email" value="{{ supplier.email }}"></div><div class="form-group"><label>Address</label><textarea name="address" rows="2">{{ supplier.address }}</textarea></div><div class="form-group"><label>Payment Terms</label><input type="text" name="payment_terms" value="{{ supplier.payment_terms }}"></div><button type="submit" class="btn btn-primary">Save Changes</button></form></div>{% endblock %}
