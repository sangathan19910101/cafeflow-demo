{% extends "base.html" %}{% block page_icon %}truck{% endblock %}{% block page_title %}Create Supplier{% endblock %}{% block content %}<div class="page-header"><h2>Create Supplier</h2><a href="{% url 'supplier_list' %}" class="btn btn-outline">Back</a></div><div class="card"><form method="post">{% csrf_token %}<div class="form-group"><label>Supplier Name</label><input type="text" name="name" required></div><div class="form-group"><label>Phone</label><input type="text" name="phone" required></div><div class="form-group"><label>Company</label><input type="text" name="company"></div><div class="form-group"><label>Email</label><input type="email" name="email"></div><div class="form-group"><label>Address</label><textarea name="address" rows="2"></textarea></div><div class="form-group"><label>Payment Terms</label><input type="text" name="payment_terms" placeholder="e.g., Net 30"></div><button type="submit" class="btn btn-success">Create Supplier</button></form></div>{% endblock %}
