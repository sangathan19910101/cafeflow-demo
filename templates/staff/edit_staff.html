{% extends "base.html" %}
{% load nepali_date %}
{% block title %}Edit Staff{% endblock %}
{% block page_icon %}user-edit{% endblock %}
{% block page_title %}Edit Staff Member{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Edit: {{ profile.user.get_full_name }}</h2>
  <a href="{% url 'staff_detail' profile.id %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
<form method="post">
  {% csrf_token %}
  <div class="grid-2">
    <div class="form-group">
      <label>Designation</label>
      <input type="text" name="designation" value="{{ profile.designation }}">
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" name="department" value="{{ profile.department.name|default:'' }}" placeholder="e.g., Kitchen, Service">
    </div>
  </div>
  <div class="grid-3">
    <div class="form-group">
      <label>Monthly Salary (NPR)</label>
      <input type="number" name="monthly_salary" step="0.01" min="0" value="{{ profile.monthly_salary }}">
    </div>
    <div class="form-group">
      <label>Hourly Rate (NPR)</label>
      <input type="number" name="hourly_rate" step="0.01" min="0" value="{{ profile.hourly_rate }}">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select name="status">
        <option value="ACTIVE" {% if profile.status == 'ACTIVE' %}selected{% endif %}>Active</option>
        <option value="ON_LEAVE" {% if profile.status == 'ON_LEAVE' %}selected{% endif %}>On Leave</option>
        <option value="TERMINATED" {% if profile.status == 'TERMINATED' %}selected{% endif %}>Terminated</option>
        <option value="SUSPENDED" {% if profile.status == 'SUSPENDED' %}selected{% endif %}>Suspended</option>
      </select>
    </div>
  </div>
  <div class="grid-2">
    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" value="{{ profile.phone }}">
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" value="{{ profile.address }}">
    </div>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="is_full_time" {% if profile.is_full_time %}checked{% endif %}>
      Full Time Employee
    </label>
  </div>
  <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
  <a href="{% url 'staff_detail' profile.id %}" class="btn btn-outline">Cancel</a>
</form>
</div>
{% endblock %}
