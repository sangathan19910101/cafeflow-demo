{% extends "base.html" %}{% block page_icon %}calendar-plus{% endblock %}{% block page_title %}Create Shift{% endblock %}{% block content %}<div class="page-header"><h2>Create Shift Template</h2><a href="{% url 'shift_calendar' %}" class="btn btn-outline">Back to Calendar</a></div><div class="card"><form method="post">{% csrf_token %}<div class="form-group"><label>Shift Name</label><input type="text" name="name" required placeholder="e.g., Morning Shift"></div><div class="form-group"><label>Branch</label><select name="branch" required>{% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}</select></div><div class="form-group"><label>Start Time</label><input type="time" name="start_time" required></div><div class="form-group"><label>End Time</label><input type="time" name="end_time" required></div><div class="form-group"><label>Break (minutes)</label><input type="number" name="break_minutes" value="30" min="0"></div><button type="submit" class="btn btn-success">Create Shift</button></form></div>{% endblock %}
