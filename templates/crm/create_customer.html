{% extends "base.html" %}
{% load nepali_date %}
{% block title %}Create Customer{% endblock %}
{% block page_icon %}user-plus{% endblock %}
{% block page_title %}New Customer{% endblock %}
{% block content %}
<div class="page-header">
  <h2>New Customer</h2>
  <a href="{% url 'customer_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
<form method="post">
  {% csrf_token %}
  <div class="grid-2">
    <div class="form-group"><label>Name *</label><input type="text" name="name" required></div>
    <div class="form-group"><label>Phone *</label><input type="text" name="phone" required></div>
  </div>
  <div class="grid-2">
    <div class="form-group"><label>Email</label><input type="email" name="email"></div>
    <div class="form-group"><label>Gender</label><select name="gender"><option value="">--</option><option value="MALE">Male</option><option value="FEMALE">Female</option><option value="OTHER">Other</option></select></div>
  </div>
  <div class="grid-2">
    <div class="form-group"><label>Address</label><input type="text" name="address"></div>
    <div class="form-group"><label>Date of Birth</label><input type="date" name="date_of_birth"></div>
  </div>
  <div class="form-group">
    <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="is_vip" style="width:auto;"> Mark as VIP</label>
  </div>
  <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Create</button>
</form>
</div>
{% endblock %}
