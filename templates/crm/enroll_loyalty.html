{% extends "base.html" %}
{% block title %}Enroll Loyalty{% endblock %}
{% block page_icon %}crown{% endblock %}
{% block page_title %}Enroll in Loyalty{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Enroll {{ customer.name }}</h2>
  <a href="{% url 'customer_detail' customer.id %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:480px;">
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label>Loyalty Program</label>
    <select name="program" required>
      <option value="">-- Select --</option>
      {% for p in programs %}
      <option value="{{ p.id }}">{{ p.name }} ({{ p.tier }}) - {{ p.discount_percent }}% off</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-success"><i class="fas fa-crown"></i> Enroll</button>
</form>
</div>
{% endblock %}
