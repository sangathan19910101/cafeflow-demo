{% extends "base.html" %}
{% load nepali_date %}
{% block title %}Edit {{ customer.name }}{% endblock %}
{% block page_icon %}user-edit{% endblock %}
{% block page_title %}Edit Customer{% endblock %}
{% block content %}
<div class="page-header">
  <h2>{{ customer.name }}</h2>
  <a href="{% url 'customer_detail' customer.id %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
<form method="post">
  {% csrf_token %}
  <div class="grid-2">
    <div class="form-group"><label>Name</label><input type="text" name="name" value="{{ customer.name }}" required></div>
    <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ customer.phone }}" required></div>
  </div>
  <div class="grid-2">
    <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ customer.email }}"></div>
    <div class="form-group"><label>Gender</label><select name="gender"><option value="">--</option><option value="MALE" {% if customer.gender == 'MALE' %}selected{% endif %}>Male</option><option value="FEMALE" {% if customer.gender == 'FEMALE' %}selected{% endif %}>Female</option><option value="OTHER" {% if customer.gender == 'OTHER' %}selected{% endif %}>Other</option></select></div>
  </div>
  <div class="form-group"><label>Address</label><input type="text" name="address" value="{{ customer.address }}"></div>
  <div class="grid-2">
    <div class="form-group"><label>Date of Birth</label><input type="date" name="date_of_birth" value="{{ customer.date_of_birth|date:'Y-m-d' }}"></div>
    <div class="form-group"><label>Tags</label><input type="text" name="tags" value="{{ customer.tags }}" placeholder="Comma-separated"></div>
  </div>
  <div class="form-group"><label>Notes</label><textarea name="notes" rows="2">{{ customer.notes }}</textarea></div>
  <div style="display:flex;gap:16px;margin-bottom:16px;">
    <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="is_vip" {% if customer.is_vip %}checked{% endif %} style="width:auto;"> VIP</label>
    <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="is_blacklisted" {% if customer.is_blacklisted %}checked{% endif %} style="width:auto;"> Blacklisted</label>
  </div>
  <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save</button>
</form>
</div>
{% endblock %}
