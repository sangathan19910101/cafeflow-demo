<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeFlow - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 25px 50px rgba(0,0,0,.25); }
        .login-card .brand { text-align: center; margin-bottom: 32px; }
        .login-card .brand i { font-size: 40px; color: #2563eb; }
        .login-card .brand h1 { font-size: 24px; font-weight: 700; margin-top: 8px; color: #1e293b; }
        .login-card .brand p { font-size: 13px; color: #64748b; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 16px; }
        .input-wrap input { width: 100%; padding: 11px 12px 11px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; transition: border-color .15s; }
        .input-wrap input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .btn-login { width: 100%; padding: 11px; background: #2563eb; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
        .btn-login:hover { background: #1d4ed8; }
        .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="fas fa-utensils"></i>
            <h1>CafeFlow</h1>
            <p>Restaurant Management Platform</p>
        </div>
        {% if form.errors %}
        <div class="error"><i class="fas fa-exclamation-circle"></i> Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" required placeholder="Enter your username" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <div class="footer">&copy; {% now "Y" %} CafeFlow. All rights reserved.</div>
    </div>
</body>
</html>
