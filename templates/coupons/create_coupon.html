{% extends "base.html" %}
{% block page_icon %}tags{% endblock %}
{% block page_title %}Create Coupon{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Create Coupon</h2>
  <a href="{% url 'coupon_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="grid-2">
      <div class="form-group">
        <label>Coupon Code</label>
        <input type="text" name="code" required placeholder="e.g., SAVE20">
      </div>
      <div class="form-group">
        <label>Discount Type</label>
        <select name="discount_type" required>
          <option value="PERCENTAGE">Percentage</option>
          <option value="FIXED">Fixed Amount</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Discount Value</label>
        <input type="number" name="discount_value" step="0.01" required placeholder="10">
      </div>
      <div class="form-group">
        <label>Minimum Order (Rs.)</label>
        <input type="number" name="minimum_order" step="0.01" value="0" min="0">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Valid From</label>
        <input type="datetime-local" name="valid_from" required value="{{ default_from }}">
      </div>
      <div class="form-group">
        <label>Valid Until</label>
        <input type="datetime-local" name="valid_until" required value="{{ default_until }}">
      </div>
    </div>
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Create Coupon</button>
    <a href="{% url 'coupon_list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
