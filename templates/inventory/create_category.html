{% extends "base.html" %}
{% block title %}Create Stock Category{% endblock %}
{% block page_icon %}plus{% endblock %}
{% block page_title %}Create Stock Category{% endblock %}
{% block content %}
<div class="page-header">
  <h2>New Stock Category</h2>
  <a href="{% url 'inventory_category_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
    <div class="form-group"><label>Description</label><textarea name="description" rows="2"></textarea></div>
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Create Category</button>
    <a href="{% url 'inventory_category_list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
