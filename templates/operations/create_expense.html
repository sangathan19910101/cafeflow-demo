{% extends "base.html" %}
{% block page_icon %}money-bill-wave{% endblock %}
{% block page_title %}Record Expense{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Record Expense</h2>
  <a href="{% url 'expense_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="grid-2">
      <div class="form-group">
        <label>Category</label>
        <select name="category" required>
          <option value="">Select Category...</option>
          {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Branch</label>
        <select name="branch" required>
          <option value="">Select Branch...</option>
          {% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Amount (Rs.)</label>
        <input type="number" name="amount" step="0.01" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Expense Date</label>
        <input type="date" name="expense_date">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="2" placeholder="Optional description..."></textarea>
    </div>
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Record Expense</button>
    <a href="{% url 'expense_list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
